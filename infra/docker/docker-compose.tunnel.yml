services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: crowd-map-cloudflared
    restart: unless-stopped
    command: tunnel run --token ${CLOUDFLARED_TUNNEL_TOKEN}
    env_file:
      - .env
    environment:
      - TZ=Asia/Tokyo
    healthcheck:
      test: ["CMD", "cloudflared", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      options:
        max-size: "10m"
        max-file: "3"
